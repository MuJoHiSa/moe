<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Gallery — Hime's Page</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="page-gallery">
  <header class="site-header">
    <div class="brand">
      <h1 class="logo">Hime's Page</h1>
    </div>
    <nav class="main-nav">
      <a href="index.html" class="nav-item">home</a>
      <a href="gallery.html" class="nav-item active">gallery</a>
      <a href="contact.html" class="nav-item">contact</a>
    </nav>
  </header>

  <main class="main-content">
    <section class="card gallery-card">
      <h2>gallery</h2>
      <p class="muted">click to enlarge — images are placeholders, replace `images/*.jpg` with your own</p>

      <div class="grid" id="galleryGrid">
        <!-- Add or remove items. Keep filenames in /images/. -->
        <img src="images/photo1.jpg" alt="Photo 1" class="grid-item" data-title="photo 1">
        <img src="images/photo2.jpg" alt="Photo 2" class="grid-item" data-title="photo 2">
        <img src="images/photo3.jpg" alt="Photo 3" class="grid-item" data-title="photo 3">
        <img src="images/photo4.jpg" alt="Photo 4" class="grid-item" data-title="photo 4">
        <img src="images/photo5.jpg" alt="Photo 5" class="grid-item" data-title="photo 5">
        <img src="images/photo6.jpg" alt="Photo 6" class="grid-item" data-title="photo 6">
      </div>
    </section>
  </main>

  <div id="lightbox" class="lightbox" aria-hidden="true">
    <button class="lb-close" aria-label="close">×</button>
    <img class="lb-image" src="" alt="">
    <div class="lb-caption"></div>
  </div>

  <footer class="site-footer">
    <small>© <span id="year2"></span> Hime's Page.</small>
  </footer>

  <script src="js/scripts.js"></script>
</body>
</html>
